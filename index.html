<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Business Explorer - TheNewsAPI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#534e52">
</head>
<body>

    <div class="header">
        <h1>🇨🇭 Swiss Business News Explorer</h1>
        <p>Monitoreo de los negocios de suiza en tiempo real</p>
    </div>

    <div class="menu-container">
        <div class="input-group">
            <label><b>Consulta:</b></label>
            <select id="endpointSelect">
                <option value="top">Noticias Destacadas</option>
                <option value="all&search=banking">Sector Bancario (Bancos)</option>
                <option value="all&search=watches">Relojería de Lujo</option>
                <option value="all&language=en">Noticias en Inglés</option>
                <option value="all&domains=nzz.ch">Fuente: Neue Zürcher Zeitung</option>
                <option value="all&search=pharma">Industria Farmacéutica</option>
            </select>
        </div>

        <div class="input-group">
            <label><b>Fecha:</b></label>
            <input type="date" id="fechaInput">
        </div>

        <button onclick="consultarAPI()">Explorar Noticias</button>
    </div>

    <div id="resultados"></div>

    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA: Service Worker registrado', reg))
                    .catch(err => console.log('PWA: Error al registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
